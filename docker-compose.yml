# TzuratLink – Docker deployment: Nginx (gateway), Django, Redis
# Mongo: use MongoDB Atlas (set MONGODB_* in .env). No mongo container.

services:
  nginx:
    image: nginx:alpine
    container_name: tzuratlink-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
    depends_on:
      django: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3

  django:
    build: .
    image: tzuratlink-django
    container_name: tzuratlink-django
    restart: unless-stopped
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - MONGODB_NAME=${MONGODB_NAME:-tzuratlink}
      - MONGODB_HOST=${MONGODB_HOST}
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - STATIC_ROOT=/static
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-false}
    volumes:
      - static_files:/static
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tzuratlink-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  static_files:
  redis_data:
