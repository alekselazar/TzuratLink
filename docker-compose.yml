# TzuratLink – Docker deployment: Django (Gunicorn), Redis.
# MongoDB: Atlas (set MONGODB_* in .env). No mongo container.
# DJANGO_IMAGE: set in .env on the server to pull a pre-built image from GHCR.
#               Leave unset locally to build from source with `docker compose build`.
# Nginx is managed outside this repo.

services:
  django:
    build: .
    image: ${DJANGO_IMAGE:-tzuratlink-django}
    container_name: tzuratlink-django
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - MONGODB_NAME=${MONGODB_NAME:-tzuratlink}
      - MONGODB_HOST=${MONGODB_HOST}
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - STATIC_ROOT=/static
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GDRIVE_BACKUP_FOLDER_ID=${GDRIVE_BACKUP_FOLDER_ID}
      - GDRIVE_CREDENTIALS=/run/secrets/gdrive-key.json
    volumes:
      - static_files:/static
      - ./gdrive-key.json:/run/secrets/gdrive-key.json:ro
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tzuratlink-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  static_files:
  redis_data:
