name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only by default; docker-build job gets packages:write via job-level override
permissions:
  contents: read

jobs:
  # ── 1. Django tests ──────────────────────────────────────────
  django-test:
    name: Django Tests
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
      DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
      MONGODB_NAME: ${{ secrets.MONGODB_NAME }}
      MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
      MONGODB_USER: ${{ secrets.MONGODB_USER }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SSR_SERVICE_URL: ${{ secrets.SSR_SERVICE_URL }}
      SECURE_SSL_REDIRECT: ${{ secrets.SECURE_SSL_REDIRECT }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GDRIVE_BACKUP_FOLDER_ID: ${{ secrets.GDRIVE_BACKUP_FOLDER_ID }}
      GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate manage.py and settings.py
        run: |
          python -c "open('manage.py','w').write('''#!/usr/bin/env python
          import os,sys
          if __name__==\"__main__\":
              os.environ.setdefault(\"DJANGO_SETTINGS_MODULE\",\"tzuratlink.settings\")
              from django.core.management import execute_from_command_line
              execute_from_command_line(sys.argv)
          ''')"
          test -f tzuratlink/settings.py || cp tzuratlink/settings.example.py tzuratlink/settings.py

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2

  # ── 2. React tests ───────────────────────────────────────────
  react-test:
    name: React Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node/package.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --ci --coverage

  # ── 3. Docker build & smoke test ─────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    needs: [django-test, react-test]
    runs-on: ubuntu-latest
    # Runs on every PR and push (not just main) — the smoke test below is what
    # would have caught the missing `COPY accounts/` bug; only the final push
    # to the registry is gated to main.
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tzuratlink:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — verify the app actually boots inside the built image
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          SITE_URL: ${{ secrets.SITE_URL }}
          MONGODB_NAME: ${{ secrets.MONGODB_NAME }}
          MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
          MONGODB_USER: ${{ secrets.MONGODB_USER }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SSR_SERVICE_URL: ${{ secrets.SSR_SERVICE_URL }}
          SECURE_SSL_REDIRECT: ${{ secrets.SECURE_SSL_REDIRECT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GDRIVE_BACKUP_FOLDER_ID: ${{ secrets.GDRIVE_BACKUP_FOLDER_ID }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: |
          docker run --rm \
            -e DJANGO_SECRET_KEY \
            -e DJANGO_DEBUG \
            -e DJANGO_ALLOWED_HOSTS \
            -e SITE_URL \
            -e MONGODB_NAME \
            -e MONGODB_HOST \
            -e MONGODB_USER \
            -e MONGODB_PASSWORD \
            -e REDIS_URL \
            -e SSR_SERVICE_URL \
            -e SECURE_SSL_REDIRECT \
            -e GOOGLE_CLIENT_ID \
            -e GOOGLE_CLIENT_SECRET \
            -e GDRIVE_BACKUP_FOLDER_ID \
            -e GDRIVE_CREDENTIALS \
            tzuratlink:ci \
            python manage.py check

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Tag and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag tzuratlink:ci "$tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
