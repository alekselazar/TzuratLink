name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only by default; docker-build job gets packages:write via job-level override
permissions:
  contents: read

jobs:
  # ── 1. Django tests ──────────────────────────────────────────
  django-test:
    name: Django Tests
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
      DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
      MONGODB_NAME: ${{ secrets.MONGODB_NAME }}
      MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
      MONGODB_USER: ${{ secrets.MONGODB_USER }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SSR_SERVICE_URL: ${{ secrets.SSR_SERVICE_URL }}
      SECURE_SSL_REDIRECT: ${{ secrets.SECURE_SSL_REDIRECT }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GDRIVE_BACKUP_FOLDER_ID: ${{ secrets.GDRIVE_BACKUP_FOLDER_ID }}
      GDRIVE_CREDENTIALS: ${{ github.workspace }}/gdrive-key.json

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google Drive service-account key
        run: echo '${{ secrets.GDRIVE_CREDENTIALS_JSON }}' > "$GDRIVE_CREDENTIALS"

      - name: Generate manage.py and settings.py
        run: |
          python -c "open('manage.py','w').write('''#!/usr/bin/env python
          import os,sys
          if __name__==\"__main__\":
              os.environ.setdefault(\"DJANGO_SETTINGS_MODULE\",\"tzuratlink.settings\")
              from django.core.management import execute_from_command_line
              execute_from_command_line(sys.argv)
          ''')"
          test -f tzuratlink/settings.py || cp tzuratlink/settings.example.py tzuratlink/settings.py

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2

  # ── 2. React tests ───────────────────────────────────────────
  react-test:
    name: React Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node/package.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --ci --coverage

  # ── 3. Docker build & push ───────────────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: [django-test, react-test]
    runs-on: ubuntu-latest
    # Only push on commits to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
