# TzuratLink – Nginx as gateway and load balancer
# Add more server lines in upstream backend to balance across multiple app replicas

upstream backend {
    least_conn;
    server django:8000;
    # server django_2:8000;   # uncomment when scaling: docker compose up -d --scale django=2
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Static files (collected by Django, shared volume)
    location /static/ {
        alias /var/www/static/;
    }

    # All other requests to Django (Gunicorn)
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
